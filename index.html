<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>2026年3月版</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="title">2026年3月版</div>
    <!-- 受注ボタンは残っていてOK（表示されても害なし） -->
    <button id="orderBtn" class="order-btn" type="button">受注</button>
  </header>

  <main class="app">
    <section class="group">
      <h2>一般品</h2>
      <div id="tblGeneral"></div>
    </section>

    <section class="group">
      <details>
        <summary>ナノニードル</summary>
        <div id="tblNeedle"></div>
      </details>
    </section>

    <section class="group">
      <details>
        <summary>ナノカニューレ</summary>
        <div id="tblCannula"></div>
      </details>
    </section>

    <!-- 固定バーに被らないよう余白 -->
    <div class="bottom-spacer"></div>
  </main>

  <!-- ★下部固定バー（税抜/税込） -->
  <div class="bottom-bar">
    <div class="bottom-left">
      <div class="bottom-title">合計</div>
      <div class="bottom-sum">
        <span class="label">税抜</span>
        <span id="sumAllEx" class="money">0</span>
        <span class="sep">/</span>
        <span class="label">税込</span>
        <span id="sumAllIn" class="money">0</span>
      </div>
      <div class="bottom-mini">
        <span>一般品: <span id="sumGeneralIn">0</span></span>
        <span>ニードル: <span id="sumNeedleIn">0</span></span>
        <span>カニューレ: <span id="sumCannulaIn">0</span></span>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
